name: Deploy to Production
on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: project65-web
          IMAGE_TAG: ${{ github.sha }}
          LATEST_TAG: latest
        run: |
          # Build a docker container and
          # push it to ECR so that it can
          # be deployed to App Runner.
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:$LATEST_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$LATEST_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy to App Runner
        run: |
          # Get Service ARN
          SERVICE_ARN=$(aws apprunner list-services --query "ServiceSummaryList[?ServiceName=='project65-web-v2'].ServiceArn" --output text)
          echo "Deploying to Service ARN: $SERVICE_ARN"
          
          # Start Deployment (This pulls the newly pushed 'latest' image)
          aws apprunner start-deployment --service-arn $SERVICE_ARN --region us-east-1

      # Note: We are deploying the image v10.8 which matches our current manual target.
      # Ideally, a build step would build a NEW image tag per commit (e.g. SHA), 
      # but for now we are just automating the "Deploy" trigger for the existing setup 
      # or assuming the build happens elsewhere or matches this tag.
      #
      # ACTUALLY: The user's goal is full automation. 
      # The previous manual steps did: Check out -> Build -> Push -> Deploy.
      # This workflow currently only does DEPLOY.
      # To fully automate, we should probably include the Build & Push steps here too.
      # Let's start with just the Deploy step as requested in the guide, 
      # but acknowledging that without a build step, it just redeploys the *same* static tag 
      # unless the tag is updated elsewhere.
      #
      # Given the user wants to "Automate Deployment", and we have a Dockerfile, 
      # let's add the Build & Push steps to make it a COMPLETE pipeline.
      
